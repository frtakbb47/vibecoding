name: pomodoro_app
description: >
  A beautiful, feature-rich cross-platform Pomodoro timer application built with Flutter.
  Includes task management, statistics, achievements, 52 language support, and more.

# The following line prevents this package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

version: 1.0.0+1

# Repository and issue tracker URLs (update with your actual repo)
# homepage: https://github.com/yourusername/pomodoro-app
# repository: https://github.com/yourusername/pomodoro-app
# issue_tracker: https://github.com/yourusername/pomodoro-app/issues

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Audio
  audioplayers: ^5.2.1

  # Charts & Statistics
  fl_chart: ^0.66.0

  # UI Utilities
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # System Tray (for desktop)
  system_tray: ^2.0.3
  window_manager: ^0.3.7
  shared_preferences: ^2.5.3

  # Screen Wakelock (prevents screen sleep during timer)
  wakelock_plus: ^1.2.8

  # Social & Gamification Features
  screenshot: ^3.0.0
  share_plus: ^10.1.4
  confetti: ^0.8.0

  # File Picker for Backup/Restore
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
